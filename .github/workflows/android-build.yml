name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: boolean

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Decode Keystore
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Build Release APK
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv ./release/app-release.apk ./release/serika-art-${{ steps.version.outputs.VERSION }}.apk

      - name: Generate Release Notes
        id: notes
        run: |
          echo "## Serika.art Android v${{ steps.version.outputs.VERSION }}" > notes.md
          echo "" >> notes.md
          echo "### Download" >> notes.md
          echo "- [Download APK](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/serika-art-${{ steps.version.outputs.VERSION }}.apk)" >> notes.md
          echo "" >> notes.md
          echo "### Installation" >> notes.md
          echo "1. Download the APK file" >> notes.md
          echo "2. Enable 'Install from unknown sources' in your Android settings" >> notes.md
          echo "3. Open the downloaded APK to install" >> notes.md
          echo "" >> notes.md
          echo "### Requirements" >> notes.md
          echo "- Android 8.0 (API 26) or higher" >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Serika.art Android v${{ steps.version.outputs.VERSION }}
          body_path: notes.md
          files: ./release/serika-art-${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build on every push to main for nightly/development builds
  nightly:
    name: Nightly Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/serika-art-nightly-${{ steps.sha.outputs.SHORT_SHA }}.apk

      - name: Update Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            ## Serika.art Android - Nightly Build
            
            ⚠️ **This is an automated nightly build and may be unstable.**
            
            Built from commit: ${{ github.sha }}
            
            ### Download
            Download the latest APK below.
            
            ### Note
            This release is automatically updated with each push to main.
          files: android/app/build/outputs/apk/debug/serika-art-nightly-${{ steps.sha.outputs.SHORT_SHA }}.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
