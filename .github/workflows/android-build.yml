name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: serika-art-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # Create release when tagged
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/serika-art-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Serika.art Android v${{ steps.version.outputs.VERSION }}
          body: |
            ## Serika.art Android v${{ steps.version.outputs.VERSION }}
            
            ### Download
            Download the APK file below and install it on your Android device.
            
            ### Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" in your Android settings
            3. Open the downloaded APK to install
            
            ### Requirements
            - Android 8.0 (API 26) or higher
          files: android/release/serika-art-${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Nightly build on main branch
      - name: Get short SHA
        if: github.ref == 'refs/heads/main'
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Rename APK for nightly
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p nightly
          cp app/build/outputs/apk/debug/app-debug.apk nightly/serika-art-nightly-${{ steps.sha.outputs.SHORT_SHA }}.apk

      - name: Update Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            ## Serika.art Android - Nightly Build
            
            ⚠️ **This is an automated nightly build and may be unstable.**
            
            Built from commit: ${{ github.sha }}
            
            ### Download
            Download the latest APK below.
            
            ### Note
            This release is automatically updated with each push to main.
          files: android/nightly/serika-art-nightly-${{ steps.sha.outputs.SHORT_SHA }}.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
